<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinnamoroll - La gran aventura de los sueños</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #cfe2ff;
    }

    body {
      position: relative;
      background-image: url("fondo-portada.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .botones {
      position: absolute;
      left: 30%;
      top: 65%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 28px;
      z-index: 10;
    }

    .boton {
      width: 290px;
      height: 86px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      color: #a9c7ff;
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .boton:hover {
      transform: scale(1.04);
      opacity: 0.96;
    }

    .boton.secundario {
      height: 74px;
      font-size: 24px;
    }

    @media (max-width: 900px) {
      .botones {
        left: 6%;
        top: 56%;
        gap: 18px;
      }

      .boton {
        width: 220px;
        height: 68px;
        font-size: 28px;
      }

      .boton.secundario {
        height: 60px;
        font-size: 19px;
      }
    }

    @media (max-width: 600px) {

body{
    background-image:url("fondo-portada-movil.png");
    background-size:cover;
    background-position:center;
}
      .botones {
        left: 50%;
        top: auto;
        bottom: 24%;
        transform: translateX(-50%);
        gap: 14px;
      }

      .boton {
        width: 180px;
        height: 60px;
        font-size: 26px;
      }

      .boton.secundario {
        height: 56px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="botones">
    <button class="boton" onclick="location.href='inicio.html'">INICIO</button>
    <button class="boton secundario" onclick="location.href='dedicatoria.html'">DEDICATORIA</button>
  </div>

</body>
</html>
