<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inicio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

width:100vw;
height:100vh;

overflow:hidden;

background-image:url("inicio.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

position:relative;
font-family:Arial, sans-serif;
}

/* BOTON JUGAR */

.jugar{

position:absolute;

left:55.3%;
top:65%;

transform:translateX(-50%);

width:140px;
height:48px;

border:none;
border-radius:30px;

background:#8ebad1;

color:white;

font-size:22px;
font-weight:bold;

cursor:pointer;

transition:.2s;
}

.jugar:hover{

transform:translateX(-50%) scale(1.05);

}

.jugar-izquierda{

position:absolute;

left:24.9%;
top:65%;

transform:translateX(-50%);

width:140px;
height:48px;

border:none;
border-radius:30px;

background:#f77589;

color:white;

font-size:22px;
font-weight:bold;

cursor:pointer;

transition:.2s;
}

.jugar-derecha{

position:absolute;

left:88.3%;
top:65%;

transform:translateX(-50%);

width:140px;
height:48px;

border:none;
border-radius:30px;

background:#56ff95;

color:white;

font-size:22px;
font-weight:bold;

cursor:pointer;

transition:.2s;
}

.jugar-izquierda:hover,
.jugar-derecha:hover{

transform:translateX(-50%) scale(1.05);

}

@media(max-width:768px){

body{

background-image:url("inicio-movil.png");

background-size:cover;

background-position:center top;

overflow-y:auto;

}

.jugar{

width:120px;
height:42px;

font-size:18px;

top:80%;
}

.jugar-izquierda{

left:65%;
top:35%;

width:90px;
height:30px;

font-size:18px;

}

.jugar{

left:65%;
top:56%;

width:90px;
height:30px;

}

.jugar-derecha{

left:65%;
top:79%;

width:90px;
height:30px;

font-size:18px;

}

}

</style>
</head>

<body>

<button
class="jugar-izquierda"
onclick="location.href='historia-kirby.html'">
JUGAR
</button>

<button
class="jugar"
onclick="location.href='historiacina.html'">
JUGAR
</button>

<button
class="jugar-derecha"
onclick="location.href='historia-ppg.html'">
JUGAR
</button>

</body>
</html>
